<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Pomodoro Flow is a polished SoundCloud-first Pomodoro app with a frontend-owned timer, tasks, theme, and local persistence.">
    <title>{% block title %}Pomodoro Flow{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script type="module" src="{{ url_for('static', filename='js/theme.js') }}"></script>
    {% block head %}{% endblock %}
  </head>
  <body data-page="{{ page_name }}">
    <div class="background-glow background-glow--one" aria-hidden="true"></div>
    <div class="background-glow background-glow--two" aria-hidden="true"></div>

    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="{{ url_for('pages.home') }}">
          <span class="brand__eyebrow">SoundCloud-first focus sessions</span>
          <span class="brand__title">Pomodoro Flow</span>
        </a>

        <nav class="site-nav" aria-label="Primary navigation">
          <a class="site-nav__link {% if page_name == 'home' %}is-active{% endif %}" href="{{ url_for('pages.home') }}">Home</a>
          <a class="site-nav__link {% if page_name == 'settings' %}is-active{% endif %}" href="{{ url_for('pages.settings') }}">Settings</a>
          <button class="ghost-button ghost-button--compact" id="theme-toggle" type="button" aria-label="Toggle theme">
            Theme
          </button>
        </nav>
      </header>

      <main class="page-content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
